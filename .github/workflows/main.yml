name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.11", "3.10"]
    steps:
      - uses: actions/checkout@v6.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r dev-requirements.txt

      - name: Run tests
        run: |
          mkdir -p docs
          python -m coverage run -m pytest -v -c configs/pytest.ini
          python -m coverage xml -o coverage.xml
          python -m coverage json -o coverage.json
          python -m coverage report | tee docs/${{ matrix.python-version }}-coverage-report.txt
        shell: bash
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload Coverage report artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            docs/${{ matrix.python-version }}-coverage-report.txt
            coverage.json
            coverage.xml


  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/dependency-review-action@v5.0.0


  security-audit:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.12
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir bandit pip-audit

      - name: Run pip-audit security linter
        run: |
          mkdir -p docs
          pip-audit --format columns | tee docs/pip-audit-report.txt
        shell: bash
        continue-on-error: false

      - name: Upload pip-audit report artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: pip-audit-report
          path: docs/pip-audit-report.txt

      - name: Run Bandit security linter
        run: |
          mkdir -p docs
          set -o pipefail
          bandit -c configs/bandit.yml -r . -f txt \
          --severity-level high --confidence-level high \
          | tee docs/bandit-report.txt
        shell: bash
        continue-on-error: false

      - name: Upload Bandit report artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bandit-report
          path: docs/bandit-report.txt


  typecheck:
    needs: security-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.12
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir mypy

      - name: Run mypy type checks
        run: |
          mkdir -p docs
          set -o pipefail
          mypy . --config-file configs/mypy.ini -v 2>docs/mypy-report-verbose.txt | tee docs/mypy-report.txt

          printf '\nChecked files by mypy:\n'
          sed -n "s/.*BuildSource(path='\([^']*\)'.*/\1/p" docs/mypy-report-verbose.txt \
          | sort -u | tee docs/mypy-files.txt
        shell: bash

      - name: Upload mypy report artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: mypy-report
          path: docs/mypy-report.txt


  formatting:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.12
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ruff black

      - name: Run code formatting checks
        shell: bash
        run: |
          ruff check .
          black --check .

  notify:
    needs: [tests, security-audit, typecheck, formatting]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all reports artifact
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: actions/download-artifact@v8.0.0
        with:
          path: ./reports
        continue-on-error: true

      - name: Zip reports
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          if ls reports/* 1> /dev/null 2>&1; then
            zip -j reports/all-reports.zip reports/*.txt reports/*.json reports/*.xml
          fi
        continue-on-error: true

      - name: Send success telegram message
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: cbrgm/telegram-github-action@v1.4.0
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          disable-web-page-preview: true
          message: |
            **Rep. Name:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})

            Branch: `${{ github.ref_name }}`
            Commit: [${{ github.event.head_commit.message }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            Author Name: ${{ github.actor }}

            ✅ Security checks have completed successfully!

      - name: Check if reports exist
        id: check_reports
        run: |
          if [ -f "./reports/all-reports.zip" ]; then
            echo "has_reports=true" >> $GITHUB_OUTPUT
          else
            echo "has_reports=false" >> $GITHUB_OUTPUT
          fi

      - name: Send failure telegram message with reports
        if: ${{ contains(needs.*.result, 'failure') && steps.check_reports.outputs.has_reports == 'true' }}
        uses: cbrgm/telegram-github-action@v1.4.0
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          media: ./reports/all-reports.zip
          media-type: document
          disable-web-page-preview: true
          message: |
            **Rep. Name:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})

            Branch: `${{ github.ref_name }}`
            Commit: [${{ github.event.head_commit.message }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            Author Name: ${{ github.actor }}

            ❌ Security checks have failed!

      - name: Send failure telegram message without reports
        if: ${{ contains(needs.*.result, 'failure') && steps.check_reports.outputs.has_reports == 'false' }}
        uses: cbrgm/telegram-github-action@v1.4.0
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          disable-web-page-preview: true
          message: |
            **Rep. Name:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})

            Branch: `${{ github.ref_name }}`
            Commit: [${{ github.event.head_commit.message }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            Author Name: ${{ github.actor }}

            ❌ Security checks have failed!
